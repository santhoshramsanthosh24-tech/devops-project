apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-app-config
  namespace: default
  labels:
    app: devops-cicd-app
data:
  application.json: |
    {
      "name": "DevOps CI/CD Application",
      "version": "1.0.0",
      "environment": "production",
      "features": {
        "monitoring": true,
        "logging": true,
        "tracing": true,
        "metrics": true
      }
    }
  nginx.conf: |
    server {
      listen 80;
      server_name _;
      
      location / {
        proxy_pass http://devops-app-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
      
      location /metrics {
        proxy_pass http://devops-app-service:3000/metrics;
      }
      
      location /health {
        proxy_pass http://devops-app-service:3000/health;
      }
    }
