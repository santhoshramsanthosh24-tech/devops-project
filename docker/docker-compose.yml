version: '3.8'

services:
  # ============ Application Service ============
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: devops-cicd-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      REGION: us-east-1
      REPLICAS: 1
    volumes:
      - ./logs:/app/logs
    networks:
      - devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============ Jenkins Service ============
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: devops-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins_home:/var/jenkins_home
    networks:
      - devops-network
    restart: unless-stopped
    privileged: true

  # ============ Prometheus Monitoring ============
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - devops-network
    restart: unless-stopped

  # ============ Grafana Dashboards ============
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_storage:/var/lib/grafana
    networks:
      - devops-network
    restart: unless-stopped

  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:15-alpine
    container_name: devops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devops_db
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops-network
    restart: unless-stopped

  # ============ PgAdmin ============
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devops-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devops.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - devops-network
    restart: unless-stopped

  # ============ Docker Registry ============
  registry:
    image: registry:2
    container_name: devops-registry
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - devops-network
    restart: unless-stopped

networks:
  devops-network:
    driver: bridge

volumes:
  jenkins_home:
  prometheus_data:
  grafana_storage:
  postgres_data:
  pgadmin_data:
  registry_data: